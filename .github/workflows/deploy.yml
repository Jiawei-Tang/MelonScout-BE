name: Deploy to Production

on:
  push:
    branches: [release]
  workflow_dispatch:
    inputs:
      db_release:
        description: "Run database migrations?"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Detect db-release
        id: check
        run: |
          if [ "${{ github.event.inputs.db_release }}" = "true" ]; then
            echo "db_release=true" >> $GITHUB_OUTPUT
            echo "DB release: true (manual trigger)"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qi "\[db-release\]"; then
              echo "db_release=true" >> $GITHUB_OUTPUT
              echo "DB release: true (commit message)"
            else
              echo "db_release=false" >> $GITHUB_OUTPUT
              echo "DB release: false"
            fi
          fi

      - name: Deploy (normal)
        if: steps.check.outputs.db_release != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/MelonScout-BE
            git fetch origin release
            git checkout release
            git pull origin release
            docker compose up -d --build
            echo "✅ Deploy complete"

      - name: Deploy (db-release)
        if: steps.check.outputs.db_release == 'true'
        uses: appleboy/ssh-action@v1
        timeout-minutes: 10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 8m
          script: |
            cd ~/MelonScout-BE
            git fetch origin release
            git checkout release
            git pull origin release

            echo "🛑 Stopping backend..."
            docker compose stop backend

            echo "📦 Rebuilding images..."
            docker compose build

            echo "🐘 Ensuring postgres is up..."
            docker compose up -d postgres
            sleep 3

            echo "🔄 Running database migrations..."
            docker compose run --rm backend bunx drizzle-kit push --force

            echo "🚀 Starting all services..."
            docker compose up -d
            echo "✅ DB release deploy complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 8
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
            else
              echo "❌ Health check failed (HTTP $STATUS)"
              docker compose -f ~/MelonScout-BE/docker-compose.yml logs --tail=30 backend
              exit 1
            fi
