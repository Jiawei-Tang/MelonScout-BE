services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: hot_search_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-melonscout_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-melonscout_dev}@postgres:5432/hot_search_db
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      TIANAPI_API_KEY: ${TIANAPI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
